name: Build & Release APK

on:
  push:
    tags:
      - 'v*'          # triggers on v1.0, v1.1, etc.
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/release.jks

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_FILE: release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK with version
        run: |
          VERSION="${GITHUB_REF_NAME:-manual}"
          cp app/build/outputs/apk/release/app-release.apk \
             "WYTV2-${VERSION}.apk"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "WYTV2-*.apk"
          generate_release_notes: true
          name: "WYT V2 ${{ github.ref_name }}"
          body: |
            ## Install instructions
            1. Download the APK file below
            2. On your Android device: Settings → Apps → Special app access → Install unknown apps
            3. Open the downloaded APK to install
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
